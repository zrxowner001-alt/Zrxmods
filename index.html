<html><head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Premium Mod Injector</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Bungee&family=Nova+Square&family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            margin: 0;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Nova Square', sans-serif;
            overflow: hidden;

            color: white;
        }

        /* ===================== PARTICLES ===================== */
        #particles-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            animation: floatUp 6s infinite linear;
        }
        .particle.type-a { background: radial-gradient(circle, #ff00aa, #7700ff); box-shadow: 0 0 8px #ff00aa; }
        .particle.type-b { background: radial-gradient(circle, #00ffff, #0033ff); box-shadow: 0 0 8px #00ffff; }
        .particle.type-c { background: radial-gradient(circle, #ff4400, #ff0066); box-shadow: 0 0 8px #ff4400; }

        @keyframes floatUp {
            0%   { transform: translateY(105vh) scale(0.3) rotate(0deg); opacity: 0; }
            15%  { opacity: 0.7; }
            85%  { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1.3) rotate(360deg); opacity: 0; }
        }

        /* ===================== MINI BUTTON ===================== */
        #miniBtn {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #1a0010, #000);
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        #miniBtn::before {
            content: '';
            position: absolute;
            width: 68px; height: 68px;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 2.5px solid transparent;
            border-top-color: #ff00aa;
            border-right-color: #ff00aa;
            border-bottom-color: #7700ff;
            border-left-color: #7700ff;
            animation: rotateCW 2s linear infinite;
            filter: drop-shadow(0 0 4px #ff00aa);
        }
        #miniBtn::after {
            content: '';
            position: absolute;
            width: 58px; height: 58px;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: #00ffff;
            border-left-color: #00ffff;
            border-bottom-color: #ff4400;
            border-right-color: #ff4400;
            animation: rotateACW 1.5s linear infinite;
            filter: drop-shadow(0 0 4px #00ffff);
        }
        @keyframes rotateCW  { to { transform: translate(-50%, -50%) rotate(360deg);  } }
        @keyframes rotateACW { to { transform: translate(-50%, -50%) rotate(-360deg); } }

        #miniBtn img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            filter: brightness(1.1) saturate(1.3);
        }

        /* ===================== MAIN CONTAINER ===================== */
        #injector-container {
            position: relative;
            width: 165px;
            background:
                linear-gradient(135deg, rgba(10,0,25,0.97) 0%, rgba(5,0,15,0.99) 100%);
            border-radius: 20px;
            padding: 14px 13px 20px;
            z-index: 10;
            margin-top: 8px;
            display: none;
            overflow: visible;
        }

        /* Animated gradient border via pseudo */
        #injector-container::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 22px;
            background: conic-gradient(
                from var(--angle, 0deg),
                #ff00aa, #7700ff, #00ffff, #ff4400, #ff00aa
            );
            z-index: -1;
            animation: spinBorder 3s linear infinite;
            filter: blur(1px);
        }
        #injector-container::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(10,0,25,0.97), rgba(5,0,15,0.99));
            z-index: -1;
        }
        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }
        @keyframes spinBorder {
            to { --angle: 360deg; }
        }

        /* Inner glow */
        .inner-glow {
            position: absolute;
            inset: 0;
            border-radius: 20px;
            box-shadow: inset 0 0 30px rgba(119,0,255,0.15), inset 0 0 60px rgba(255,0,170,0.08);
            pointer-events: none;
            z-index: 1;
        }

        /* ===================== TOP TAG ===================== */
        .top-tag {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(90deg, #7700ff, #ff00aa, #00ffff, #ff00aa, #7700ff);
            background-size: 200% 100%;
            padding: 3px 10px;
            border-radius: 20px;
            font-family: 'Bungee', cursive;
            font-weight: 700;
            font-size: 9px;
            color: white;
            letter-spacing: 2px;
            white-space: nowrap;
            box-shadow: 0 0 20px rgba(119,0,255,0.8), 0 0 40px rgba(255,0,170,0.5);
            text-shadow: 0 0 8px rgba(255,255,255,0.8);
            animation: badgeSlide 3s linear infinite, badgePulse 2s ease-in-out infinite;
        }

        /* ===================== HEADER ===================== */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-top: 6px;
            margin-bottom: 8px;
            position: relative;
            z-index: 2;
        }

        .main-title {
            font-family: 'Bungee Shade', cursive;
            color: #e0d0ff;
            font-size: 8.5px;
            font-weight: 900;
            line-height: 1.2;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(180,100,255,0.6);
            animation: glitchTitle 4s infinite;
        }
        @keyframes glitchTitle {
            0%, 92%, 100% { transform: none; text-shadow: 0 0 10px rgba(180,100,255,0.6); }
            93% { transform: translateX(2px); text-shadow: -2px 0 #ff00aa, 2px 0 #00ffff; }
            94% { transform: translateX(-2px); text-shadow: 2px 0 #ff00aa, -2px 0 #00ffff; }
            95% { transform: none; text-shadow: 0 0 10px rgba(180,100,255,0.6); }
            96% { transform: translateX(1px) skewX(3deg); }
            97% { transform: none; }
        }

        .sub-title {
            color: #00ffcc;
            font-size: 10px;
            font-weight: 800;
            margin-top: 3px;
            font-family: 'Share Tech Mono', monospace;
            text-shadow: 0 0 12px #00ffcc, 0 0 25px rgba(0,255,204,0.4);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: flex-end;
        }

        .actv-btn {
            background: linear-gradient(135deg, rgba(119,0,255,0.3), rgba(255,0,170,0.3));
            border: 1.5px solid #aa44ff;
            color: #cc88ff;
            border-radius: 8px;
            padding: 2px 7px;
            font-size: 8px;
            font-weight: 700;
            font-family: 'Bungee', cursive;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(170,0,255,0.4), inset 0 0 8px rgba(170,0,255,0.2);
            text-shadow: 0 0 6px #aa44ff;
            animation: actvPulse 1.5s ease-in-out infinite;
        }
        @keyframes actvPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(170,0,255,0.4), inset 0 0 8px rgba(170,0,255,0.2); }
            50%       { box-shadow: 0 0 20px rgba(170,0,255,0.8), inset 0 0 15px rgba(170,0,255,0.4); }
        }

        .close-btn {
            background: rgba(80, 0, 20, 0.8);
            border: 1.5px solid #ff0055;
            color: #ff4488;
            border-radius: 7px;
            width: 18px; height: 18px;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255,0,85,0.5);
            transition: all 0.2s;
            line-height: 1;
            padding-bottom: 1px;
        }
        .close-btn:active { transform: scale(0.85); box-shadow: 0 0 20px rgba(255,0,85,0.9); }

        /* ===================== DISPLAY SCREEN ===================== */
        .display-screen {
            position: relative;
            background: linear-gradient(135deg, #020008, #050010, #020008);
            border: 1px solid rgba(119,0,255,0.4);
            border-radius: 12px;
            padding: 8px 6px 10px;
            margin-bottom: 8px;
            overflow: hidden;
            z-index: 2;
        }
        /* Scanline overlay */
        .display-screen::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,255,200,0.02) 2px,
                rgba(0,255,200,0.02) 4px
            );
            pointer-events: none;
            z-index: 3;
        }
        /* Scanline overlay fix */
.display-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,200,0.02) 2px, rgba(0,255,200,0.02) 4px);
    pointer-events: none; /* <-- Ye line check karein ya add karein */
    z-index: 3;
}

/* Moving scan line fix */
.display-screen::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 40px;
    background: linear-gradient(to bottom, transparent, rgba(0,255,180,0.04), transparent);
    animation: scanLine 3s linear infinite;
    pointer-events: none; /* <-- Ye line ZAROOR add karein */
    z-index: 4;
}

        /* Moving scan line */
        .display-screen::after {
            content: '';
            position: absolute;
            left: 0; right: 0;
            height: 40px;
            background: linear-gradient(to bottom, transparent, rgba(0,255,180,0.04), transparent);
            animation: scanLine 3s linear infinite;
            z-index: 4;
        }
        @keyframes scanLine {
            0%   { top: -40px; }
            100% { top: 100%; }
        }
        /* Scanline overlay fix */
.display-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,200,0.02) 2px, rgba(0,255,200,0.02) 4px);
    pointer-events: none; /* <-- Ye line check karein ya add karein */
    z-index: 3;
}

/* Moving scan line fix */
.display-screen::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 40px;
    background: linear-gradient(to bottom, transparent, rgba(0,255,180,0.04), transparent);
    animation: scanLine 3s linear infinite;
    pointer-events: none; /* <-- Ye line ZAROOR add karein */
    z-index: 4;
}

        /* Corner brackets */
        .corner {
            position: absolute;
            width: 12px; height: 12px;
            border-color: #cc00ff;
            border-style: solid;
            z-index: 5;
        }
        .top-left    { top: 3px; left: 3px;   border-width: 2px 0 0 2px; border-top-left-radius: 4px; }
        .top-right   { top: 3px; right: 3px;  border-width: 2px 2px 0 0; border-top-right-radius: 4px; }
        .bottom-left { bottom: 5px; left: 3px;  border-width: 0 0 2px 2px; border-bottom-left-radius: 4px; }
        .bottom-right{ bottom: 5px; right: 3px; border-width: 0 2px 2px 0; border-bottom-right-radius: 4px; }

        /* SYS ONLINE */
        .sys-online {
            text-align: right;
            font-family: 'Orbitron', monospace;
            font-size: 8px;
            font-weight: 900;
            margin-bottom: 6px;
            letter-spacing: 3px;
            position: relative;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
        }
        .sys-online::before {
            content: '';
            width: 5px; height: 5px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 8px #00ff88;
            animation: ledBlink 1s ease-in-out infinite;
            display: inline-block;
        }
        .sys-online-text { color: #00ff88; text-shadow: 0 0 8px #00ff88; animation: ledBlink 1s ease-in-out infinite; }
        @keyframes ledBlink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }

        /* Console View */
        .console-text {
            text-align: center;
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            font-weight: 700;
            line-height: 1.5;
            letter-spacing: 1.5px;
            position: relative;
            z-index: 5;
            padding: 4px 0;
        }
        .cyan-text   { color: #00ffff; text-shadow: 0 0 10px #00ffff, 0 0 20px rgba(0,255,255,0.4); }
        .yellow-text { color: #ffcc00; text-shadow: 0 0 10px #ffcc00, 0 0 20px rgba(255,204,0,0.4); }
        .mt-2        { margin-top: 4px; }
        .blink-fast  { animation: blink 0.6s infinite; }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.1; }
        }

        /* Result View */
        .result-box {
            display: none;
            text-align: center;
            position: relative;
            z-index: 5;
            padding: 2px 0 4px;
        }
        .res-period {
            color: #ffcc00;
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 5px;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(255,204,0,0.6);
        }
        .res-text {
            font-family: 'Bungee', cursive;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 3px;
            text-shadow: 0 0 15px currentColor, 0 0 30px currentColor;
            animation: resPulse 1s ease-in-out infinite;
        }
        @keyframes resPulse {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.05); }
        }

        .bottom-node {
            position: absolute;
            bottom: -6px; left: 50%;
            transform: translateX(-50%);
            width: 10px; height: 7px;
            background: #050010;
            border: 2px solid #7700ff;
            border-radius: 50%;
            box-shadow: 0 0 10px #7700ff, 0 0 20px rgba(119,0,255,0.5);
            z-index: 6;
        }

        /* ===================== ACTION BUTTON ===================== */
        .register-btn {
            width: 100%;
            background: linear-gradient(135deg, #ff0066, #7700ff, #ff0066);
            background-size: 200% 100%;
            border: none;
            color: white;
            font-family: 'Bungee', cursive;
            font-size: 10px;
            font-weight: 700;
            padding: 7px 4px;
            border-radius: 10px;
            letter-spacing: 2px;
            margin-bottom: 8px;
            cursor: pointer;
            text-shadow: 0 0 8px rgba(255,255,255,0.8);
            box-shadow: 0 0 20px rgba(255,0,102,0.6), 0 4px 15px rgba(119,0,255,0.4);
            transition: all 0.2s;
            animation: btnShimmer 3s linear infinite;
            position: relative;
            z-index: 2;
            overflow: hidden;
        }
        .register-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            animation: btnShine 2s linear infinite;
        }
        @keyframes btnShimmer {
            0%   { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        @keyframes btnShine {
            0%   { left: -100%; }
            100% { left: 200%; }
        }
        .register-btn:active { transform: scale(0.95); box-shadow: 0 0 30px rgba(255,0,102,0.9); }
        .register-btn:disabled { opacity: 0.6; animation: none; }

        /* ===================== DUAL BUTTONS ===================== */
        .dual-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 6px;
            position: relative;
            z-index: 2;
        }

        .hide-btn {
            flex: 1;
            background: rgba(20,10,40,0.9);
            border: 1px solid rgba(100,80,150,0.5);
            color: #8877aa;
            padding: 5px 2px;
            border-radius: 8px;
            font-weight: 700;
            font-family: 'Nova Square', sans-serif;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
        }
        .hide-btn:active { background: rgba(40,20,60,0.9); color: #cc99ff; }

        .mode-btn {
            flex: 1;
            background: linear-gradient(135deg, rgba(255,170,0,0.2), rgba(255,100,0,0.2));
            border: 1.5px solid #ff8800;
            color: #ffaa00;
            padding: 5px 2px;
            border-radius: 8px;
            font-weight: 800;
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(255,136,0,0.4);
            text-shadow: 0 0 8px #ff8800;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .mode-btn:active { box-shadow: 0 0 25px rgba(255,136,0,0.8); }

        /* ===================== LOCKED BADGE ===================== */
        .locked-badge {
            position: absolute;
            bottom: -14px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(90deg, #7700ff, #ff00aa, #00ffff, #ff00aa, #7700ff);
            background-size: 200% 100%;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-family: 'Bungee', cursive;
            font-weight: 700;
            font-size: 7px;
            white-space: nowrap;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(119,0,255,0.8), 0 0 40px rgba(255,0,170,0.5);
            animation: badgeSlide 3s linear infinite, badgePulse 2s ease-in-out infinite;
            z-index: 2;
        }
        @keyframes badgeSlide { to { background-position: 200% 0; } }

        /* Vertical sweep line during loading */
        .sweep-line {
            position: absolute;
            left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #7700ff, #ff00aa, #00ffff, #ff4400, #ffcc00, #00ffff, #7700ff);
            background-size: 200% 100%;
            box-shadow: 0 0 10px #ff00aa, 0 0 20px #7700ff, 0 0 35px #00ffff;
            animation: sweepDown 1s linear infinite, badgeSlide 1.5s linear infinite;
            z-index: 10;
            border-radius: 2px;
            pointer-events: none;
        }
        @keyframes sweepDown {
            0%   { top: 0px;   opacity: 1; }
            90%  { opacity: 1; }
            100% { top: 100%;  opacity: 0; }
        }

        /* Shake + glow on result reveal */
        @keyframes shakeGlow {
            0%   { transform: translateX(0);    box-shadow: inset 0 0 30px rgba(119,0,255,0.15); }
            10%  { transform: translateX(-5px); box-shadow: inset 0 0 40px rgba(255,0,170,0.6), 0 0 30px rgba(255,0,170,0.5); }
            20%  { transform: translateX(5px);  box-shadow: inset 0 0 50px rgba(0,255,255,0.6), 0 0 40px rgba(0,255,255,0.5); }
            30%  { transform: translateX(-4px); box-shadow: inset 0 0 40px rgba(119,0,255,0.7), 0 0 35px rgba(119,0,255,0.6); }
            40%  { transform: translateX(4px);  box-shadow: inset 0 0 50px rgba(255,0,170,0.5), 0 0 50px rgba(255,0,170,0.5); }
            50%  { transform: translateX(-2px); box-shadow: inset 0 0 60px rgba(0,255,255,0.8), 0 0 60px rgba(0,255,255,0.6); }
            60%  { transform: translateX(2px);  box-shadow: inset 0 0 50px rgba(255,0,170,0.6), 0 0 50px rgba(255,0,170,0.5); }
            70%  { transform: translateX(-1px); box-shadow: inset 0 0 40px rgba(119,0,255,0.5), 0 0 40px rgba(119,0,255,0.4); }
            80%  { transform: translateX(1px);  box-shadow: inset 0 0 30px rgba(0,255,255,0.4), 0 0 30px rgba(0,255,255,0.3); }
            100% { transform: translateX(0);    box-shadow: inset 0 0 30px rgba(119,0,255,0.15); }
        }
        .shake-glow {
            animation: shakeGlow 0.7s ease-out forwards !important;
        }
        @keyframes badgePulse {
            0%, 100% { box-shadow: 0 0 20px rgba(119,0,255,0.8), 0 0 40px rgba(255,0,170,0.5); }
            50%       { box-shadow: 0 0 30px rgba(0,255,255,0.8), 0 0 60px rgba(119,0,255,0.7); }
        }

        /* HEX grid bg decoration */
        .hex-bg {
            position: absolute;
            inset: 0;
            border-radius: 20px;
            opacity: 0.04;
            background-image:
                repeating-linear-gradient(60deg, #aa00ff 0, #aa00ff 1px, transparent 0, transparent 50%),
                repeating-linear-gradient(-60deg, #aa00ff 0, #aa00ff 1px, transparent 0, transparent 50%),
                repeating-linear-gradient(0deg, #aa00ff 0, #aa00ff 1px, transparent 0, transparent 50%);
            background-size: 20px 20px;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>

<div id="miniBtn" onclick="toggleHUD(true)">

            <div style="display: flex; flex-direction: column; align-items: center; gap: 5px;">
                <div class="res-text" id="res-text">WAIT</div>
                <img id="res-num-img" src="" style="width: 50px; height: 50px; display: none; border-radius: 8px; box-shadow: 0 0 15px rgba(255,255,255,0.4), 0 0 30px rgba(119,0,255,0.4);">
            </div>
        </div>

        <div class="bottom-node"></div>
    </div>

    <button class="register-btn" id="action-btn" onclick="handleAction()">⚡ LOGIN NOW</button>

    <div class="dual-buttons">
        <button class="hide-btn" onclick="closeMenu()">∅ HIDE</button>
        <button class="mode-btn" id="mode-btn" onclick="toggleMode()">BS ONLY</button>
    </div>

    <div class="locked-badge">🔥 100% LOCKED 🔥</div>
</div>

<script>
    // --- PARTICLES GENERATOR (enhanced) ---
    const pContainer = document.getElementById('particles-container');
    const types = ['type-a', 'type-b', 'type-c'];
    for (let i = 0; i < 30; i++) {
        let p = document.createElement('div');
        p.className = 'particle ' + types[i % 3];
        let sz = Math.random() * 6 + 2;
        p.style.left = Math.random() * 100 + 'vw';
        p.style.width = sz + 'px';
        p.style.height = sz + 'px';
        p.style.animationDuration = (Math.random() * 4 + 4) + 's';
        p.style.animationDelay = (Math.random() * 6) + 's';
        pContainer.appendChild(p);
    }

    // --- INITIALIZATION ---
    window.onload = function () { fetchConfig(); };

    function toggleHUD(show) {
        if (show) {
            document.body.style.background = 'transparent';
            document.getElementById('miniBtn').style.display = 'none';
            document.getElementById('injector-container').style.display = 'block';
            if (typeof TeamBridge !== 'undefined' && TeamBridge.resizeView) {
                TeamBridge.resizeView(185, 345);
            }
        } else {
            document.getElementById('injector-container').style.display = 'none';
            document.getElementById('miniBtn').style.display = 'flex';
            if (typeof TeamBridge !== 'undefined' && TeamBridge.resizeView) {
                TeamBridge.resizeView(80, 80);
            }
        }
    }

    // --- HACK / TEAMBRIDGE LOGIC (UNTOUCHED) ---
    var hackId = new URLSearchParams(window.location.search).get('id') || 'black_magic';
    var balance = '0.00';
    var state = 'auth';
    var config = {
        name: 'BLACK MAGIC',
        min_balance: 300,
        same_trend: true,
        links: {
            register: 'https://www.jaiclub77.com/#/register?invitationCode=273843754586',
            login: 'https://www.jaiclub77.com/#/register?invitationCode=273843754586',
            recharge: 'https://www.jaiclub77.com/#/wallet/Recharge'
        }
    };
    var currentGameCode = 'WinGo_1M';
    var lastPeriod = "";
    var cachedResult = null;
    var lastSpokenState = "";

    const hackSound = new Audio('https://www.soundjay.com/communication/digital-beeps-05.mp3');
    hackSound.loop = true;

    async function fetchConfig() {
        try {
            const response = await fetch('/get_config?id=' + hackId);
            const data = await response.json();
            config.name = data.name || config.name;
            config.min_balance = data.min_balance || config.min_balance;
            config.links = data.links || config.links;
            if (config.links && config.links.register && typeof TeamBridge !== 'undefined') {
                TeamBridge.loadUrl(config.links.register);
            }
            updateUI();
        } catch (e) { console.log("Using hardcoded config"); updateUI(); }
    }

    if (typeof TeamBridge === 'undefined') {
        window.TeamBridge = { resizeView: (w, h) => { }, loadUrl: (u) => window.open(u, '_blank'), speak: (t) => { } };
    }

    function route(s, bal) {
        balance = bal;
        if (state === 'scanning') return;
        if (s.startsWith('wingo_')) {
            state = 'wingo';
            if (s === 'wingo_30s') currentGameCode = 'WinGo_30S';
            else if (s === 'wingo_1m') currentGameCode = 'WinGo_60S';
            else if (s === 'wingo_3m') currentGameCode = 'WinGo_180S';
            else if (s === 'wingo_5m') currentGameCode = 'WinGo_300S';
        } else {
            state = s;
        }
        if (state === 'recharge' && lastSpokenState !== "RECHARGE_PAGE") {
            TeamBridge.speak("Recharge ke section pe hain, kripya " + config.min_balance + " rupaye deposit karein");
            lastSpokenState = "RECHARGE_PAGE";
        }
        updateUI();
    }

    const ballImages = [
        "ball_0-4df7a1a1.webp", "ball_1-16f101f9.png", "ball_2-90c715eb.png",
        "ball_3-7d1eaf72.png", "ball_4-d2fd005e.png", "ball_5-486569b1.png",
        "ball_6-0dd961ad.png", "ball_7-d61de263.png", "ball_8-20a95133.webp",
        "ball_9-ef7e204f.webp"
    ];
    const ballBaseUrl = "https://jaiclub20.us.cc/assets/png/";

    function updateUI() {
        if (state === 'scanning') return;
        let actionBtn = document.getElementById('action-btn');
        let consoleView = document.getElementById('console-view');
        let resultView = document.getElementById('result-view');
        let cleanBal = 0;
        let match = balance.replace(/,/g, '').match(/[0-9.]+/);
        if (match) cleanBal = parseFloat(match[0]);

        // Agar result state hai toh kuch mat karo — result hold rahega jab tak re-scan na kare
        if (state === 'result') return;

        const currentTimePeriod = getTimePeriod();
        if (cachedResult && lastPeriod === currentTimePeriod) {
            consoleView.style.display = 'none';
            resultView.style.display = 'block';
            let resText = document.getElementById('res-text');
            let resNumImg = document.getElementById('res-num-img');
            let displayNum = (manualNum !== null) ? manualNum : cachedResult.num;
            let displayRes = displayNum >= 5 ? "BIG" : "SMALL";
            resText.innerText = displayRes;
            resText.style.color = (displayRes === 'BIG') ? "#39ff14" : "#ff0066";
            if (resNumImg) {
                resNumImg.src = ballBaseUrl + ballImages[displayNum];
                resNumImg.style.display = showNumber ? "block" : "none";
            }
            document.getElementById('res-period').innerText = "PERIOD: " + lastPeriod.slice(-4);
            actionBtn.innerText = "⚡ RE-SCAN";
        } else {
            consoleView.style.display = 'block';
            resultView.style.display = 'none';
            if (state === 'reg') {
                consoleView.innerHTML = `<div class="cyan-text mt-2">ACCESS DENIED</div><div class="yellow-text mt-2 blink-fast">REGISTER FIRST</div>`;
                actionBtn.innerText = "⚡ REGISTER NOW";
            } else if (state === 'auth') {
                consoleView.innerHTML = `<div class="cyan-text mt-2">ACCESS DENIED</div><div class="yellow-text mt-2 blink-fast">LOGIN FIRST</div>`;
                actionBtn.innerText = "⚡ LOGIN NOW";
            } else if (cleanBal < config.min_balance) {
                consoleView.innerHTML = `<div class="cyan-text mt-2">LOCKED</div><div class="yellow-text mt-2 blink-fast">MIN ₹${config.min_balance} REQ</div>`;
                actionBtn.innerText = "⚡ RECHARGE";
            } else {
                consoleView.innerHTML = `<div class="cyan-text mt-2">SYSTEM READY</div><div class="yellow-text mt-2 blink-fast">AWAITING COMMAND...</div>`;
                actionBtn.innerText = "⚡ START HACK";
            }
        }
    }

    function handleAction() {
        let cleanBal = parseFloat(balance.replace(/,/g, '').match(/[0-9.]+/)) || 0;
        if (state === 'reg') TeamBridge.loadUrl(config.links.register);
        else if (state === 'auth') TeamBridge.loadUrl(config.links.login);
        else if (cleanBal < config.min_balance) TeamBridge.loadUrl(config.links.recharge);
        else performAnalysis();
    }

    function getTimePeriod() {
        const now = new Date();
        const offset = 5.5 * 60 * 60 * 1000;
        const istTime = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + offset);
        const y = istTime.getFullYear();
        const m = (istTime.getMonth() + 1).toString().padStart(2, '0');
        const d = istTime.getDate().toString().padStart(2, '0');
        const totalMinutes = (istTime.getHours() * 60) + istTime.getMinutes() - 330;
        const periodSuffix = (totalMinutes < 0 ? 0 : totalMinutes + 1).toString().padStart(4, '0');
        return y + m + d + "01" + periodSuffix;
    }

    function getDeterministicPrediction(period) {
        let hash = 0;
        for (let i = 0; i < period.length; i++) {
            hash = ((hash << 5) - hash) + period.charCodeAt(i);
            hash |= 0;
        }
        const num = Math.abs(hash) % 10;
        return { num: num, res: num >= 5 ? "BIG" : "SMALL" };
    }

    async function performAnalysis() {
        state = 'scanning';
        manualNum = null;
        let actionBtn = document.getElementById('action-btn');
        let consoleView = document.getElementById('console-view');
        let resultView = document.getElementById('result-view');

        actionBtn.disabled = true;
        consoleView.style.display = 'block';
        resultView.style.display = 'none';

        try { hackSound.play(); } catch (e) { }

        // Add sweep line to display-screen
        const displayScreen = document.querySelector('.display-screen');
        const sweepEl = document.createElement('div');
        sweepEl.className = 'sweep-line';
        sweepEl.id = 'sweep-line';
        displayScreen.appendChild(sweepEl);

        consoleView.innerHTML = `
            <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:75px; padding:4px 0;">
                <div style="position:relative; width:40px; height:40px; flex-shrink:0;">
                    <div style="position:absolute; inset:0; border:3px solid transparent; border-top-color:#ff00aa; border-right-color:#7700ff; border-radius:50%; animation:rotateCW 1.2s linear infinite; filter:drop-shadow(0 0 6px #ff00aa);"></div>
                    <div style="position:absolute; inset:6px; border:2px solid transparent; border-top-color:#00ffff; border-left-color:#ff4400; border-radius:50%; animation:rotateACW 0.9s linear infinite; filter:drop-shadow(0 0 4px #00ffff);"></div>
                    <div style="position:absolute; inset:12px; border:2px solid transparent; border-bottom-color:#ffcc00; border-right-color:#7700ff; border-radius:50%; animation:rotateCW 0.6s linear infinite;"></div>
                </div>
                <div style="color:#00ffcc; font-family:'Share Tech Mono',monospace; font-size:11px; margin-top:10px; letter-spacing:3px; animation:blink 0.5s infinite; text-shadow:0 0 10px #00ffcc; white-space:nowrap;">SCANNING...</div>
                <div style="color:rgba(170,100,255,0.7); font-family:'Share Tech Mono',monospace; font-size:8px; margin-top:4px; letter-spacing:2px; white-space:nowrap;">ANALYZING DATA</div>
            </div>
        `;

        const timePeriod = getTimePeriod();
        let finalRes, finalNum, displayPeriod;

        try {
            const response = await fetch(`https://draw.ar-lottery01.com/WinGo/${currentGameCode}/GetHistoryIssuePage.json?ts=${Date.now()}`);
            const json = await response.json();
            if (json.data && json.data.list && json.data.list.length > 0) {
                displayPeriod = json.data.list[0].issueNumber;
                let apiNum = parseInt(json.data.list[0].number);
                if (config.same_trend) {
                    finalNum = apiNum;
                    finalRes = finalNum >= 5 ? "BIG" : "SMALL";
                } else {
                    const pred = getDeterministicPrediction(timePeriod);
                    finalNum = pred.num;
                    finalRes = pred.res;
                }
            } else { throw new Error("API Fail"); }
        } catch (e) {
            const pred = getDeterministicPrediction(timePeriod);
            finalNum = pred.num;
            finalRes = pred.res;
            displayPeriod = timePeriod;
        }

        lastPeriod = timePeriod;
        cachedResult = { res: finalRes, num: finalNum };

        setTimeout(() => {
            try { hackSound.pause(); hackSound.currentTime = 0; } catch(e){}

            // Remove sweep line
            const sw = document.getElementById('sweep-line');
            if (sw) sw.remove();

            consoleView.style.display = 'none';
            resultView.style.display = 'block';

            let resText = document.getElementById('res-text');
            let resNumImg = document.getElementById('res-num-img');
            resText.innerText = finalRes;
            resText.style.color = (finalRes === 'BIG') ? "#39ff14" : "#ff0066";
            if (resNumImg) {
                resNumImg.src = ballBaseUrl + ballImages[finalNum];
                resNumImg.style.display = showNumber ? "block" : "none";
            }
            document.getElementById('res-period').innerText = "PERIOD: " + displayPeriod.slice(-4);
            actionBtn.disabled = false;
            actionBtn.innerText = "⚡ RE-SCAN";
            state = 'result';
            TeamBridge.speak(finalRes + " " + finalNum);

            // Shake + glow effect on display screen
            const ds = document.querySelector('.display-screen');
            ds.classList.remove('shake-glow');
            void ds.offsetWidth; // reflow to restart animation
            ds.classList.add('shake-glow');
            setTimeout(() => ds.classList.remove('shake-glow'), 800);
        }, 3000);
    }

    // --- MODE TOGGLE ---
    var showNumber = false;
    function toggleMode() {
        showNumber = !showNumber;
        const btn = document.getElementById('mode-btn');
        if (showNumber) {
            btn.innerText = 'BS + NUM';
            btn.style.background = 'linear-gradient(135deg, rgba(0,255,255,0.2), rgba(119,0,255,0.2))';
            btn.style.border = '1.5px solid #00ffff';
            btn.style.color = '#00ffff';
            btn.style.textShadow = '0 0 8px #00ffff';
            btn.style.boxShadow = '0 0 12px rgba(0,255,255,0.5)';
        } else {
            btn.innerText = 'BS ONLY';
            btn.style.background = 'linear-gradient(90deg, #ffaa00, #ff8800)';
            btn.style.border = 'none';
            btn.style.color = 'black';
            btn.style.textShadow = 'none';
            btn.style.boxShadow = '0 0 15px rgba(255,170,0,0.6)';
        }
        // Agar result already show ho raha hai toh turant update karo
        if (cachedResult && state === 'result') {
            const resNumImg = document.getElementById('res-num-img');
            if (resNumImg) {
                resNumImg.src = ballBaseUrl + ballImages[cachedResult.num];
                resNumImg.style.display = showNumber ? "block" : "none";
            }
        }
    }

    // --- MANUAL RESULT CYCLE ---
    var manualNum = null;

    document.getElementById('result-view').addEventListener('click', function() {
        cycleResult();
    });

    function cycleResult() {
    // Check karein ki result mode active hai ya nahi
    if (state !== 'result' && state !== 'wingo') return; 

    let current = (manualNum !== null) ? manualNum : cachedResult.num;
    let next = (current + 1) % 10;
    
    manualNum = next;

    let res = next >= 5 ? "BIG" : "SMALL";
    let resText = document.getElementById('res-text');
    let resNumImg = document.getElementById('res-num-img');

    // UI update
    resText.innerText = res;
    resText.style.color = (res === 'BIG') ? "#39ff14" : "#ff0066";
    
    if (resNumImg) {
        resNumImg.src = ballBaseUrl + ballImages[next];
        // Agar BS ONLY mode hai toh image hide rahegi, warna show hogi
        resNumImg.style.display = showNumber ? "block" : "none";
    }
    
    // Voice feedback (Optional: agar aap chahte hain tap par bhi bole)
    if (typeof TeamBridge !== 'undefined') {
        TeamBridge.speak(res + " " + next);
    }
}

</script>

</body></html>
